services:
  node0:
    image: paxos-kvstore:latest
    build: .
    hostname: node0
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.rmi.server.hostname=node0"
      ACCEPT_FAIL: "0.0"
      PROPOSE_FAIL: "0.0"
    command: ["0", "node0", "1099", "node0", "1099", "--init"]
    networks: [paxos_net]
    stop_grace_period: 3s
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/1099 && exec 3<&-"]
      interval: 1s
      timeout: 2s
      retries: 30
      start_period: 2s

  node1:
    image: paxos-kvstore:latest
    build: .
    hostname: node1
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.rmi.server.hostname=node1"
      ACCEPT_FAIL: "0.0"
      PROPOSE_FAIL: "0.0"
    command: ["1", "node1", "1099", "node0", "1099"]
    networks: [paxos_net]
    stop_grace_period: 3s
    depends_on:
      node0:
        condition: service_healthy

  node2:
    image: paxos-kvstore:latest
    build: .
    hostname: node2
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.rmi.server.hostname=node2"
      ACCEPT_FAIL: "0.0"
      PROPOSE_FAIL: "0.0"
    command: ["2", "node2", "1099", "node0", "1099"]
    networks: [paxos_net]
    stop_grace_period: 3s
    depends_on:
      node0:
        condition: service_healthy

  node3:
    image: paxos-kvstore:latest
    build: .
    hostname: node3
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.rmi.server.hostname=node3"
      ACCEPT_FAIL: "0.0"
      PROPOSE_FAIL: "0.0"
    command: ["3", "node3", "1099", "node0", "1099"]
    networks: [paxos_net]
    stop_grace_period: 3s
    depends_on:
      node0:
        condition: service_healthy

  node4:
    image: paxos-kvstore:latest
    build: .
    hostname: node4
    environment:
      JAVA_TOOL_OPTIONS: "-Djava.rmi.server.hostname=node4"
      ACCEPT_FAIL: "0.0"
      PROPOSE_FAIL: "0.0"
    command: ["4", "node4", "1099", "node0", "1099"]
    networks: [paxos_net]
    stop_grace_period: 3s
    depends_on:
      node0:
        condition: service_healthy

networks:
  paxos_net:
    driver: bridge
